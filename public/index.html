<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Memory Agent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --border: #262626;
  --border-subtle: #1f1f1f;
  --text: #ededed;
  --text-muted: #8b8b8b;
  --accent: #ffffff;
  --font-sans: 'Inter', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 13px; line-height: 1.5; height: 100vh; overflow: hidden; }

.app { display: flex; height: 100vh; }
.main { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow-y: auto; padding: 40px; }
.sidebar { width: 340px; background: var(--surface); display: flex; flex-direction: column; height: 100vh; border-left: 1px solid var(--border); }

/* HEADER */
.header { margin-bottom: 32px; }
.header h1 { font-size: 16px; font-weight: 500; }
.header p { color: var(--text-muted); font-size: 12px; margin-top: 4px; }

/* SEARCH */
.search-container { position: relative; margin-bottom: 24px; }
textarea { 
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; 
  padding: 16px; color: var(--text); font-family: var(--font-sans); font-size: 14px; resize: none; min-height: 80px; 
  outline: none;
}
textarea:focus { border-color: #404040; }
.search-controls { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; }

button { cursor: pointer; font-family: var(--font-sans); border: none; background: none; color: var(--text); }
.btn-primary { background: var(--accent); color: #000; padding: 6px 16px; border-radius: var(--radius); font-weight: 500; font-size: 12px; }
.btn-primary:disabled { opacity: 0.5; }

.toggle-group { display: flex; gap: 4px; background: var(--bg); padding: 4px; border-radius: var(--radius); border: 1px solid var(--border); }
.toggle-btn { padding: 4px 10px; font-size: 11px; border-radius: 4px; color: var(--text-muted); }
.toggle-btn.active { background: #262626; color: var(--text); }

.ai-switch { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text-muted); cursor: pointer; }
.ai-switch input { display: none; }
.ai-indicator { width: 8px; height: 8px; border-radius: 50%; background: #333; }
.ai-switch input:checked + .ai-indicator { background: #d4d4d4; }

/* STATUS */
.status-area { margin-bottom: 24px; font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }
.subq-list { display: flex; gap: 8px; margin-top: 8px; }
.subq-tag { padding: 2px 6px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; }
.subq-tag.done { border-color: #444; }

/* RESULTS */
.result-card { padding: 16px 0; border-bottom: 1px solid var(--border-subtle); }
.result-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.result-title a { color: var(--text); text-decoration: none; }
.result-meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-bottom: 8px; }
.result-snippet { color: var(--text-muted); margin-bottom: 12px; }
.result-actions { display: flex; gap: 8px; }
.action-btn { font-size: 11px; padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px; color: var(--text-muted); }
.action-btn.active { background: #262626; color: var(--text); }

.ai-badge { display: inline-flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); margin-top: 8px; }
.ai-badge.relevant { color: #a3e635; }
.ai-badge.irrelevant { color: #f87171; }

/* SIDEBAR */
.sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 16px; margin-top: 24px; }
.tab { padding: 12px 16px; font-size: 12px; color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: var(--text); border-bottom-color: var(--accent); }
.sidebar-content { flex: 1; overflow-y: auto; padding: 24px; }
.panel { display: none; }
.panel.active { display: block; }

.mem-item { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 12px; }
.mem-q { font-size: 12px; font-weight: 500; margin-bottom: 6px; }
.mem-m { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); display: flex; justify-content: space-between; }
.domain-row { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; margin-bottom: 8px; color: var(--text-muted); }

@keyframes spin { 100% { transform: rotate(360deg); } }
.spinner { width: 10px; height: 10px; border: 2px solid var(--border); border-top-color: var(--text-muted); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; }

@media (max-width: 768px) {
  body { height: auto; overflow: visible; }
  .app { flex-direction: column; height: auto; }
  .main { border-right: none; padding: 20px; overflow-y: visible; height: auto; }
  .sidebar { width: 100%; height: auto; border-left: none; border-top: 1px solid var(--border); }
  .search-controls { flex-direction: column; gap: 16px; align-items: flex-start; }
}
</style>
</head>
<body>
<div class="app">
  <div class="main">
    <div class="header">
      <h1>Search Memory Agent</h1>
      <p>Sober, elegant neural search with AI continual learning.</p>
    </div>

    <div class="search-container">
      <textarea id="query" placeholder="Ask anything..."></textarea>
      <div class="search-controls">
        <div style="display:flex; gap:16px; align-items:center;">
          <div class="toggle-group" id="depth-group">
            <button class="toggle-btn" data-val="fast">Fast</button>
            <button class="toggle-btn active" data-val="auto">Auto</button>
            <button class="toggle-btn" data-val="deep-lite">Deep</button>
          </div>
          <label class="ai-switch"><input type="checkbox" id="ai-toggle" checked><div class="ai-indicator"></div> AI Judge</label>
        </div>
        <button class="btn-primary" id="run-btn" onclick="runAgent()">Run Agent</button>
      </div>
    </div>

    <div class="status-area" id="log"></div>
    <div class="subq-list" id="subq-list"></div>
    <div id="results" style="margin-top:24px;"></div>
  </div>

  <div class="sidebar">
    <div class="sidebar-tabs">
      <div class="tab active" data-tab="memory">Memory</div>
      <div class="tab" data-tab="learning">Learning</div>
      <div class="tab" data-tab="privacy">Privacy</div>
    </div>
    <div class="sidebar-content">
      <div class="panel active" id="panel-memory"><div id="mem-list"></div><button class="action-btn" onclick="memory=[];save()" style="width:100%;margin-top:16px">Clear</button></div>
      <div class="panel" id="panel-learning">
        <div style="margin-bottom:24px"><div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">TRUSTED</div><div id="trusted-list"></div></div>
        <div><div style="font-size:11px;color:var(--text-muted);margin-bottom:12px">NOISY</div><div id="noisy-list"></div></div>
      </div>
      <div class="panel" id="panel-privacy"><div style="font-size:11px;color:var(--text-muted)">All data stored locally in browser. Exa for search, Gemini for AI judge. No trackers.</div></div>
    </div>
  </div>
</div>

<script>
const SK = 'sma_mem_v3', FK = 'sma_sig_v3';
let memory = JSON.parse(localStorage.getItem(SK) || '[]');
let signals = JSON.parse(localStorage.getItem(FK) || '{}');
let depth = 'auto', running = false;

document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab, .panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active'); document.getElementById('panel-' + t.dataset.tab).classList.add('active');
  };
});

document.querySelectorAll('#depth-group .toggle-btn').forEach(b => {
  b.onclick = () => { document.querySelectorAll('#depth-group .toggle-btn').forEach(x => x.classList.remove('active')); b.classList.add('active'); depth = b.dataset.val; };
});

function save() { localStorage.setItem(SK, JSON.stringify(memory)); localStorage.setItem(FK, JSON.stringify(signals)); renderMem(); renderLearn(); }

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderMem() {
  document.getElementById('mem-list').innerHTML = memory.map(m => `<div class="mem-item"><div class="mem-q">${esc(m.q)}</div><div class="mem-m"><span>${m.c} items</span> <span>${m.d}</span></div></div>`).join('');
}

function renderLearn() {
  let t=[], n=[];
  for (const [dom, sig] of Object.entries(signals)) {
    const tot = sig.yes + sig.no; if (tot===0) continue;
    (sig.yes/tot > 0.5 ? t : n).push({dom, r:sig.yes/tot, t:tot});
  }
  document.getElementById('trusted-list').innerHTML = t.sort((a,b)=>b.r-a.r).map(x=>`<div class="domain-row"><span>${esc(x.dom)}</span><span>${Math.round(x.r*100)}%</span></div>`).join('');
  document.getElementById('noisy-list').innerHTML = n.sort((a,b)=>a.r-b.r).map(x=>`<div class="domain-row"><span>${esc(x.dom)}</span><span>${Math.round(x.r*100)}%</span></div>`).join('');
}

function scoreResult(r, q) {
  let base = 0.5;
  try { const dom = new URL(r.url).hostname.replace('www.',''); const sig = signals[dom]; if (sig && (sig.yes+sig.no)>0) base = sig.yes/(sig.yes+sig.no); } catch {}
  return Math.min(Math.round(base*100)/100, 1);
}

function fb(i, t, btn, dom) {
  btn.parentNode.querySelectorAll('.fb').forEach(b=>b.classList.remove('active')); btn.classList.add('active');
  if(!signals[dom]) signals[dom]={yes:0,no:0}; signals[dom][t]++; save();
}

function saveMem(q, dom, btn) {
  btn.classList.add('active'); btn.textContent='Saved'; const ex = memory.find(m=>m.q===q);
  if(ex) ex.c++; else memory.push({q, d:new Date().toLocaleDateString(), c:1}); save();
}

function renderResults(res, q) {
  const container = document.getElementById('results'); container.innerHTML = '';
  res.forEach((r, i) => {
    let dom = '—'; try { dom = new URL(r.url).hostname.replace('www.',''); } catch {}
    const div = document.createElement('div'); div.className = 'result-card'; div.dataset.idx = i;
    div.innerHTML = `
      <div class="result-title"><a href="${esc(r.url)}" target="_blank">${esc(r.title||'Untitled')}</a></div>
      <div class="result-meta"><span>${esc(dom)}</span> | <span>Score: ${scoreResult(r,q)}</span></div>
      <div class="result-snippet">${esc(r.highlights?.[0]||r.text||'').slice(0,150)}...</div>
      <div class="result-actions">
        <button class="action-btn fb" onclick="fb(${i},'yes',this,'${dom}')">Relevant</button>
        <button class="action-btn fb" onclick="fb(${i},'no',this,'${dom}')">Irrelevant</button>
        <button class="action-btn" onclick="saveMem('${esc(q)}','${dom}',this)">Save</button>
      </div>
      <div id="ai-${i}"></div>
    `;
    container.appendChild(div);
  });
}

async function aiEval(res, q) {
  res.forEach((_,i) => { const el = document.getElementById(`ai-${i}`); if(el) el.innerHTML='<div class="ai-badge"><span class="spinner"></span> Judging...</div>'; });
  try {
    const req = await fetch('/api/evaluate', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, results:res}) });
    const data = await req.json();
    if(!data.evaluations) return;
    for (const ev of data.evaluations) {
      const el = document.getElementById(`ai-${ev.index}`); if(!el) continue;
      const cls = ev.verdict==='relevant'?'relevant':ev.verdict==='irrelevant'?'irrelevant':'';
      const icon = ev.verdict==='relevant'?'✓':ev.verdict==='irrelevant'?'✕':'—';
      el.innerHTML = `<div class="ai-badge ${cls}">${icon} AI: ${ev.verdict}</div>`;
      
      let dom; try { dom = new URL(res[ev.index].url).hostname.replace('www.',''); } catch {continue;}
      if(!signals[dom]) signals[dom]={yes:0,no:0};
      if(ev.verdict==='relevant') signals[dom].yes++; else if(ev.verdict==='irrelevant') signals[dom].no++;
    }
    save();
  } catch {}
}

async function runAgent() {
  const q = document.getElementById('query').value.trim(); if(!q || running) return;
  running = true; document.getElementById('run-btn').disabled = true; document.getElementById('log').textContent = 'Searching...';
  
  try {
    const dCfg = {'fast':3, 'auto':5, 'deep-lite':10}[depth];
    const res = await fetch('/api/search', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({query:q, num_results:dCfg, contents:{highlights:{num_sentences:2,highlights_per_url:1}}}) });
    const data = await res.json();
    document.getElementById('log').textContent = `Found ${data.results?.length||0} results`;
    if(data.results) {
      renderResults(data.results, q);
      if(document.getElementById('ai-toggle').checked) await aiEval(data.results, q);
    }
  } catch(e) { document.getElementById('log').textContent = 'Error: ' + e.message; }
  
  running = false; document.getElementById('run-btn').disabled = false;
}

document.getElementById('query').onkeydown = e => { if(e.key==='Enter' && (e.ctrlKey||e.metaKey)) runAgent(); };
renderMem(); renderLearn();
</script>
</body>
</html>
